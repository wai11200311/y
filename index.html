<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AR Taekwondo Rizaldy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="layar-mulai" class="layar-penuh">
        <h2>Mulai Eksplorasi AR</h2>
        <p>Arahkan kamera ke marker Hiro</p>
        <button id="tombol-mulai">START</button>
    </div>

    <div id="panel-sabuk" class="tersembunyi">
        <h2 id="judul-sabuk"></h2>
        <p id="arti-sabuk"></p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
        <a-assets>
            <audio id="audioSejarah" src="audio.mp3" preload="auto"></audio>
            <audio id="audioBacksound" src="backmusic.mp3" preload="auto" loop="true"></audio>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            
            <a-entity id="karakterUtama"
                      gltf-model="orang/scene.gltf" 
                      scale="1.5 1.5 1.5" 
                      position="0 0 0" 
                      animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                      animation__fadeout="property: scale; to: 0 0 0; dur: 1000; startEvents: sembunyi"
                      animation__fadein="property: scale; to: 1.5 1.5 1.5; dur: 1000; startEvents: muncul">
            </a-entity>

            <a-entity id="temple1"
                      gltf-model="temple1/scene.gltf" 
                      scale="0 0 0" 
                      position="0 0 0" 
                      animation="property: rotation; from: 0 0 0; to: 0 360 0; loop: true; dur: 10000; easing: linear"
                      animation__fadeout="property: scale; to: 0 0 0; dur: 1000; startEvents: sembunyi"
                      animation__fadein="property: scale; to: 0.001 0.001 0.001; dur: 1000; startEvents: muncul">
            </a-entity>

            <a-entity id="efekPartikel" 
                      position="0 1 0" 
                      particle-system="preset: stars; color: #FFD700, #FFA500; particleCount: 300; size: 1">
            </a-entity>
            
            <a-entity id="visualSabuk" 
                      gltf-model="belt.glb" 
                      visible="false" 
                      scale="0 0 0" 
                      position="0 0.3 0" 
                      warnai-sabuk="#FFFFFF"
                      animation__fadein="property: scale; to: 1 1 1; dur: 1000; startEvents: munculSabuk">
            </a-entity>

        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
